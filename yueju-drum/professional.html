                    <span class="rec-time" id="recTime">00:00</span>

    <script src="scripts/recorder.js"></script>
    <script>
    (function () {
        'use strict';

        var allInstruments = [
            { id: 'big-luo', name: '大锣', cat: '京剧', image: 'images/instruments/daluo.png', fastAudio: 'audio/daluo-f.m4a', normalAudio: 'audio/daluo-l.m4a' },
            { id: 'nao-bo', name: '铙钹', cat: '京剧', image: 'images/instruments/naobo.png', fastAudio: 'audio/naobo-f.m4a', normalAudio: 'audio/naobo-l.m4a' },
            { id: 'small-luo', name: '小锣', cat: '京剧', image: 'images/instruments/xiaoluo.png', fastAudio: 'audio/xiaoluo-f.m4a', normalAudio: 'audio/xiaoluo-l.m4a' },
            { id: 'danpi-gu', name: '单皮鼓', cat: '京剧', image: 'images/instruments/danpigu.png', fastAudio: 'audio/danbigu.m4a', normalAudio: 'audio/danbigu.m4a' },
            { id: 'gaobian-luo', name: '高边锣', cat: '粤剧', image: 'images/instruments/gaobianluo.png', fastAudio: 'audio/gaobianluo-f.m4a', normalAudio: 'audio/gaobianluo-l.m4a' },
            { id: 'wen-luo', name: '文锣', cat: '粤剧', image: 'images/instruments/wenluo.png', fastAudio: 'audio/wenluo-f.m4a', normalAudio: 'audio/wenluo-l.m4a' },
            { id: 'shi-cha', name: '狮镲', cat: '粤剧', image: 'images/instruments/shicha.png', fastAudio: 'audio/shicha-f.m4a', normalAudio: 'audio/shicha-l.m4a' },
            { id: 'shuangpi-gu', name: '双皮鼓', cat: '粤剧', image: 'images/instruments/shuangpigu.png', fastAudio: 'audio/zhangban-shuangpigu.m4a', normalAudio: 'audio/zhangban-shuangpigu.m4a' },
            { id: 'mu-yu', name: '木鱼', cat: '粤剧', image: 'images/instruments/muyu.png', fastAudio: 'audio/zhangban-muyu.m4a', normalAudio: 'audio/zhangban-muyu.m4a' },
            { id: 'sha-gu', name: '沙鼓', cat: '粤剧', image: 'images/instruments/shagu.png', fastAudio: 'audio/zhangban-shagu.m4a', normalAudio: 'audio/zhangban-shagu.m4a' }
        ];

        var KEY_MAP = {
            'q': 'big-luo', 'w': 'nao-bo', 'e': 'small-luo', 'r': 'danpi-gu',
            'a': 'gaobian-luo', 's': 'wen-luo', 'd': 'shi-cha', 'f': 'shuangpi-gu',
            'z': 'mu-yu', 'x': 'sha-gu'
        };
        var KEY_LABELS = {};
        Object.keys(KEY_MAP).forEach(function (k) { KEY_LABELS[KEY_MAP[k]] = k.toUpperCase(); });

        var audioPools = {};
        var audioCursors = {};
        var feedbackTimer = null;

        function createPool(src, size) {
            var pool = [];
            for (var i = 0; i < size; i++) {
                var a = new Audio(src);
                a.preload = 'auto';
                pool.push(a);
            }
            return pool;
        }

        function initAudio() {
            allInstruments.forEach(function (inst) {
                audioPools[inst.id + '_fast'] = createPool(inst.fastAudio, 5);
                audioCursors[inst.id + '_fast'] = 0;
                if (inst.normalAudio !== inst.fastAudio) {
                    audioPools[inst.id + '_normal'] = createPool(inst.normalAudio, 3);
                    audioCursors[inst.id + '_normal'] = 0;
                }
            });
        }

        function playFromPool(poolKey, seek) {
            var pool = audioPools[poolKey];
            if (!pool) return;
            var c = audioCursors[poolKey] || 0;
            var a = pool[c % pool.length];
            audioCursors[poolKey] = (c + 1) % pool.length;
            a.pause();
            a.currentTime = seek || 0;
            a.play().catch(function () {});
        }

        window.playInstrumentAudio = function (id, type) {
            var key = id + '_' + (type === 'normal' ? 'normal' : '_fast');
            if (!audioPools[key]) key = id + '_fast';
            var seek = (id === 'small-luo' && type === 'fast') ? 0.4 : 0;
            playFromPool(key, seek);
        };

        function showFeedback(name) {
            var el = document.getElementById('hitFeedback');
            if (!el) return;
            el.textContent = name;
            el.classList.add('show');
            if (feedbackTimer) clearTimeout(feedbackTimer);
            feedbackTimer = setTimeout(function () { el.classList.remove('show'); }, 800);
        }

        function render() {
            var container = document.getElementById('proInstruments');
            container.innerHTML = '';
            allInstruments.forEach(function (inst) {
                var card = document.createElement('div');
                card.className = 'pro-inst-card';
                card.setAttribute('data-id', inst.id);

                var img = document.createElement('img');
                img.className = 'pro-inst-img';
                img.src = inst.image;
                img.alt = inst.name;

                var name = document.createElement('div');
                name.className = 'pro-inst-name';
                name.textContent = inst.name;

                var cat = document.createElement('div');
                cat.className = 'pro-inst-cat';
                cat.textContent = inst.cat;

                card.appendChild(img);
                card.appendChild(name);
                card.appendChild(cat);

                if (KEY_LABELS[inst.id]) {
                    var keyTag = document.createElement('span');
                    keyTag.className = 'pro-key-hint';
                    keyTag.textContent = KEY_LABELS[inst.id];
                    card.appendChild(keyTag);
                }

                container.appendChild(card);

                bindHit(card, inst);
            });
        }

        function bindHit(card, inst) {
            var longPressed = false;
            var timer = null;

            function onStart(e) {
                e.preventDefault();
                longPressed = false;
                if (timer) { clearTimeout(timer); timer = null; }
                timer = setTimeout(function () {
                    longPressed = true;
                    var seek = 0;
                    var poolKey = inst.id + '_normal';
                    if (!audioPools[poolKey]) poolKey = inst.id + '_fast';
                    playFromPool(poolKey, seek);
                    triggerAnim(card);
                    showFeedback(inst.name);
                    if (window.Recorder) window.Recorder.recordEvent(inst.id, 'normal');
                }, 320);
            }

            function onEnd(e) {
                e.preventDefault();
                if (timer) { clearTimeout(timer); timer = null; }
                if (!longPressed) {
                    var seek = (inst.id === 'small-luo') ? 0.4 : 0;
                    playFromPool(inst.id + '_fast', seek);
                    triggerAnim(card);
                    showFeedback(inst.name);
                    if (window.Recorder) window.Recorder.recordEvent(inst.id, 'fast');
                }
            }

            function onCancel() {
                if (timer) { clearTimeout(timer); timer = null; }
                longPressed = false;
            }

            card.addEventListener('touchstart', onStart, { passive: false });
            card.addEventListener('touchend', onEnd, { passive: false });
            card.addEventListener('touchcancel', onCancel);
            card.addEventListener('mousedown', onStart);
            card.addEventListener('mouseup', onEnd);
            card.addEventListener('mouseleave', onCancel);
        }

        function triggerAnim(el) {
            el.classList.remove('hit-anim');
            void el.offsetWidth;
            el.classList.add('hit-anim');
            setTimeout(function () { el.classList.remove('hit-anim'); }, 150);
        }

        function init() {
            initAudio();
            render();
            Recorder.init({
                btnRecord: 'btnRecord', btnStop: 'btnStop',
                btnPause: 'btnPause', btnPlay: 'btnPlay',
                timeDisplay: 'recTime', statusDisplay: 'recStatus'
            });

            document.addEventListener('keydown', function (e) {
                if (e.repeat || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                var key = e.key.toLowerCase();
                var instId = KEY_MAP[key];
                if (!instId) return;
                var card = document.querySelector('[data-id="' + instId + '"]');
                if (!card) return;
                e.preventDefault();
                var seek = (instId === 'small-luo') ? 0.4 : 0;
                playFromPool(instId + '_fast', seek);
                triggerAnim(card);
                var inst = allInstruments.find(function (i) { return i.id === instId; });
                if (inst) showFeedback(inst.name);
                if (window.Recorder) window.Recorder.recordEvent(instId, 'fast');
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
