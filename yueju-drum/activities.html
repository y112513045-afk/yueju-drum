    <style>
        /* 添加自定义样式解决下拉菜单消失问题 */
        .dropdown-container {
            position: relative;
        }
        .dropdown-menu {
            /* 移除可能导致间隙的margin-top */
            margin-top: 0;
            /* 添加过渡效果使显示更平滑 */
            transition: opacity 0.2s ease-in-out, visibility 0.2s ease-in-out;
        }
        /* 确保链接有足够的点击区域 */
        .dropdown-container > a {
            display: inline-block;
