<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粤韵锣鼓坊</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 引入自定义样式 -->
    <link rel="stylesheet" href="styles/style.css">
    <style>
        /* 添加自定义样式解决下拉菜单消失问题 */
        .dropdown-container {
            position: relative;
        }
        .dropdown-menu {
            /* 移除可能导致间隙的margin-top */
            margin-top: 0;
            /* 添加过渡效果使显示更平滑 */
            transition: opacity 0.2s ease-in-out, visibility 0.2s ease-in-out;
        }
        /* 确保链接有足够的点击区域 */
        .dropdown-container > a {
            display: inline-block;
            padding: 4px 0;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <!-- 页面头部 -->
    <header class="bg-red-800 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6 flex flex-col md:flex-row justify-between items-center">
            <!-- 左侧Logo区域 -->
            <div class="flex items-center space-x-3 mb-4 md:mb-0">
                <i class="fa fa-music text-3xl" aria-hidden="true"></i>
                <h1 class="text-2xl md:text-3xl font-bold">粤韵锣鼓坊</h1>
            </div>
            
            <!-- 导航菜单 - 居中显示 -->
            <nav class="w-full md:w-auto">
                <ul class="flex justify-center space-x-6">
                    <li><a href="play.html" class="hover:text-yellow-300 transition-colors">开始演奏</a></li>
                    <li><a href="train.html" class="hover:text-yellow-300 transition-colors">节奏训练</a></li>
                    <li><a href="create.html" class="hover:text-yellow-300 transition-colors">创意编曲</a></li>
                    <li><a href="professional.html" class="hover:text-yellow-300 transition-colors">专业模式</a></li>
                    <li><a href="index.html" class="hover:text-yellow-300 transition-colors">首页</a></li>
                    
                    <!-- 修复后的下拉菜单 -->
                    <li class="dropdown-container group relative">
                        <a href="#" class="hover:text-yellow-300 transition-colors">了解更多</a>
                        <!-- 下拉菜单 -->
                        <ul class="dropdown-menu absolute left-0 w-48 bg-red-800 rounded-md shadow-lg py-1 hidden group-hover:block z-50">
                            <li><a href="products.html" class="block px-4 py-2 hover:bg-red-700 transition-colors">文创产品</a></li>
                            <li><a href="courses.html" class="block px-4 py-2 hover:bg-red-700 transition-colors">戏曲课程</a></li>
                            <li><a href="activities.html" class="block px-4 py-2 hover:bg-red-700 transition-colors">活动推送</a></li>
                            <li><a href="cooperation.html" class="block px-4 py-2 hover:bg-red-700 transition-colors">合作咨询</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>


    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-8">
        <section class="mb-16">
            <h2 class="text-3xl font-bold text-center mb-12 text-gray-800">合作与咨询</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-lg p-6 h-full">
                        <h3 class="text-xl font-bold mb-6 text-gray-800">联系方式</h3>
                        
                        <div class="space-y-4">
                            <div class="flex items-start">
                                <div class="bg-red-100 p-3 rounded-full mr-4">
                                    <i class="fa fa-map-marker text-red-600"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-gray-800">地址</h4>
                                    <p class="text-gray-600">广州市越秀区东风东路703号</p>
                                </div>
                            </div>
                            
                            <div class="flex items-start">
                                <div class="bg-red-100 p-3 rounded-full mr-4">
                                    <i class="fa fa-phone text-red-600"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-gray-800">电话</h4>
                                    <p class="text-gray-600">020-12345678</p>
                                </div>
                            </div>
                            
                            <div class="flex items-start">
                                <div class="bg-red-100 p-3 rounded-full mr-4">
                                    <i class="fa fa-envelope text-red-600"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-gray-800">邮箱</h4>
                                    <p class="text-gray-600">contact@yueyun.com</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-8">
                            <h3 class="text-xl font-bold mb-4 text-gray-800">合作类型</h3>
                            <ul class="space-y-2">
                                <li class="flex items-center text-gray-600">
                                    <i class="fa fa-check text-green-500 mr-2"></i>
                                    学校戏曲教育合作
                                </li>
                                <li class="flex items-center text-gray-600">
                                    <i class="fa fa-check text-green-500 mr-2"></i>
                                    文化活动策划执行
                                </li>
                                <li class="flex items-center text-gray-600">
                                    <i class="fa fa-check text-green-500 mr-2"></i>
                                    文创产品开发销售
                                </li>
                                <li class="flex items-center text-gray-600">
                                    <i class="fa fa-check text-green-500 mr-2"></i>
                                    媒体内容合作推广
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl shadow-lg p-6">
                        <h3 class="text-xl font-bold mb-6 text-gray-800">咨询表单</h3>
                        
                        <form class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-gray-700 mb-2" for="name">姓名</label>
                                    <input type="text" id="name" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" placeholder="请输入您的姓名">
                                </div>
                                
                                <div>
                                    <label class="block text-gray-700 mb-2" for="phone">电话</label>
                                    <input type="tel" id="phone" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" placeholder="请输入您的联系电话">
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 mb-2" for="email">邮箱</label>
                                <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" placeholder="请输入您的邮箱地址">
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 mb-2" for="type">合作类型</label>
                                <select id="type" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent">
                                    <option value="">请选择合作类型</option>
                                    <option value="education">学校戏曲教育合作</option>
                                    <option value="event">文化活动策划执行</option>
                                    <option value="product">文创产品开发销售</option>
                                    <option value="media">媒体内容合作推广</option>
                                    <option value="other">其他合作</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 mb-2" for="message">咨询内容</label>
                                <textarea id="message" rows="5" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent" placeholder="请详细描述您的需求或问题"></textarea>
                            </div>
                            
                            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white py-3 px-6 rounded-lg transition-colors text-lg font-medium">
                                提交咨询
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚（与其他页面相同） -->
    <footer class="bg-gray-800 text-white py-12">
        <!-- 页脚内容与其他页面相同 -->
    </footer>
</body>
</html>
