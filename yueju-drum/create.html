    <!-- 创意编曲区 -->
        <section id="create" class="mb-16 bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">创意编曲</h2>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <h3 class="text-xl font-bold mb-4 text-gray-800">素材库</h3>
                    <div class="space-y-4">
                        <div>
                            <h4 class="font-semibold mb-2 text-gray-700">曲牌旋律</h4>
                            <div id="melodies-library" class="space-y-2 max-h-40 overflow-y-auto p-2 border border-gray-200 rounded-lg">
                                <!-- 曲牌旋律将在这里动态添加 -->
                            </div>
                        </div>
                        <div>
                            <h4 class="font-semibold mb-2 text-gray-700">节奏型</h4>
                            <div id="rhythms-library" class="space-y-2 max-h-40 overflow-y-auto p-2 border border-gray-200 rounded-lg">
                                <!-- 节奏型将在这里动态添加 -->
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="lg:col-span-2">
                    <h3 class="text-xl font-bold mb-4 text-gray-800">编曲工作台</h3>
                    <div id="arrangement-timeline" class="bg-gray-50 p-4 rounded-lg mb-4 min-h-60 border border-gray-200">
                        <!-- 编曲时间线将在这里显示 -->
                        <div class="text-center text-gray-500 py-12">
                            <i class="fa fa-arrow-left text-2xl mb-2"></i>
                            <p>从左侧素材库拖放元素到这里开始编曲</p>
                        </div>
                    </div>
                    <div class="flex justify-between">
                        <button id="play-arrangement-btn" class="bg-green-600 hover:bg-green-700 text-white py-2 px-6 rounded-lg transition-colors">
                            <i class="fa fa-play mr-2"></i>播放
                        </button>
                        <button id="clear-arrangement-btn" class="bg-gray-600 hover:bg-gray-700 text-white py-2 px-6 rounded-lg transition-colors">
                            <i class="fa fa-trash mr-2"></i>清空
                        </button>
                        <button id="save-arrangement-btn" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-lg transition-colors">
                            <i class="fa fa-save mr-2"></i>保存作品
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 作品分享区 -->
        <section id="share" class="mb-16 bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">作品分享</h2>
            <div class="mb-6">
                <h3 class="text-xl font-bold mb-4 text-gray-800">我的作品</h3>
                <div id="my-works" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- 我的作品将在这里动态添加 -->
                    <div class="text-center text-gray-500 py-12 col-span-full">
                        <p>你还没有保存任何作品</p>
                        <a href="#create" class="text-blue-600 hover:underline mt-2 inline-block">去创作一个吧</a>
                    </div>
                </div>
            </div>
            
            <div>
                <h3 class="text-xl font-bold mb-4 text-gray-800">社区精选</h3>
                <div id="community-works" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- 社区作品将在这里动态添加 -->
                </div>
            </div>
        </section>
